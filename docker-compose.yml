name: cctv-tailgate

services:
  cctv-tailgate:
    build: .
    image: cctv-tailgate
    container_name: cctv-tailgate
    restart: unless-stopped
    gpus: all
    # Reachable only from the host by default. Do not change to 0.0.0.0 unless
    # the service sits behind a VPN or an authenticated reverse proxy.
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    volumes:
      # Configuration and secrets (kept out of the image).
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        bind:
          create_host_path: false
      - type: bind
        source: ./.env
        target: /app/.env
        bind:
          create_host_path: false
      - ./secrets:/app/secrets
      # Persistent runtime output.
      - ./captures:/app/captures
      - ./logs:/app/logs
      - ./data:/app/data
