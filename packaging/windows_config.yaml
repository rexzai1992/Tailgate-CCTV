# Default configuration for the packaged Windows app.
# Uses server-side "local" camera capture: the app opens the camera directly,
# so the OS grants camera permission once and the browser never prompts.
camera:
  name: Main Entrance
  source: '0'            # camera number: 0 = default device, 1 = next, ...
  width: 1280
  height: 720
  require_focus_area: false
  browser_device_id: ''
  browser_device_label: ''
  mode: ip
  source_mode: local
  rtsp_transport: tcp
  target_fps: 12.0
detection:
  model: yolo11n.pt
  confidence: 0.35
  iou: 0.5
  tracker: bytetrack.yaml
counting_line:
  points:
  - - 0.1
    - 0.55
  - - 0.9
    - 0.55
  in_side: positive
  deadband_pixels: 8
  crossing_cooldown_seconds: 1.0
  same_direction_cooldown_seconds: 8.0
  rearm_distance_pixels: 24
  minimum_travel_pixels: 20
  tracker_state_ttl_seconds: 30
  segment_margin_pixels: 0   # only count between the line's endpoints (the marks)
  count_out: false
focus_area:
  enabled: false
  points: []
tailgating:
  enabled: true
  detection_mode: entry_burst
  minimum_people: 2
  token_valid_seconds: 6
  max_people_per_token: 1
  tailgating_time_window_seconds: 4
  capture_snapshot: true
  capture_body_closeup: true
  body_padding_percent: 0.12
  capture_face_closeup: true
  face_padding_percent: 0.3
  min_face_pixels: 36
  require_eye_confirmation: true
  min_face_sharpness: 35
  save_event_clip: true
  clip_pre_seconds: 4    # seconds of lead-in before the event
  clip_post_seconds: 6   # seconds to keep recording after the suspect leaves frame
  clip_max_seconds: 30   # hard cap on total clip length
  snapshot_dir: captures/tailgating
  alert_cooldown_seconds: 5
  telegram_cooldown_seconds: 0   # 0 = send a Telegram photo for every tailgating event
  show_alert_on_screen: true
  clip_fps: 10
door_zone:
  enabled: false
  points: []
gate_zone:
  enabled: false
  points: []
  motion_threshold: 0.02
  idle_seconds: 1.0
api:
  enabled: true
  host: 127.0.0.1
  port: 8080
logging:
  people_count_csv: logs/people_count_log.csv
  security_events_csv: logs/security_events.csv
  gate_events_csv: logs/gate_events.csv
  event_db: data/gym_sentry.db
