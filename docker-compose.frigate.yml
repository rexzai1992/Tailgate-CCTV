services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: tailgate-mosquitto
    restart: unless-stopped
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -s /mosquitto/config/passwords ]; then
          mosquitto_passwd -b -c /mosquitto/config/passwords "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        fi
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 127.0.0.1 -u $$MQTT_USERNAME -P $$MQTT_PASSWORD -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: tailgate-frigate
    restart: unless-stopped
    privileged: true
    shm_size: "512mb"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Kuala_Lumpur}
      FRIGATE_MQTT_USER: ${MQTT_USERNAME}
      FRIGATE_MQTT_PASSWORD: ${MQTT_PASSWORD}
      FRIGATE_HIKVISION_HOST: ${HIKVISION_HOST}
      FRIGATE_HIKVISION_USER: ${HIKVISION_USERNAME}
      FRIGATE_HIKVISION_PASSWORD: ${HIKVISION_PASSWORD}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frigate/config.yml:/config/config.yml:ro
      - ./frigate/storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "8971:8971"
      - "${FRIGATE_INTERNAL_PORT:-5000}:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
